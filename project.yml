name: WeCookin
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 10.24.0
targets:
  WeCookin:
    type: application
    platform: iOS
    sources:
      - path: WeCookin
      - path: RecipeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.wecookin
        PRODUCT_NAME: WeCookin
        SWIFT_VERSION: 5.10
        INFOPLIST_KEY_CFBundleName: "WeCookin'"
        INFOPLIST_KEY_CFBundleDisplayName: "WeCookin'"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UIRequiresFullScreen: false
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.food-and-drink
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLSchemes:
              - wecookin
        DEVELOPMENT_ASSET_PATHS: "\"WeCookin/Preview Content\""
        TARGETED_DEVICE_FAMILY: 1
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        CODE_SIGN_ENTITLEMENTS: Config/WeCookin.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - target: WeCookinShareExtension
        embed: true
    info:
      path: Config/WeCookin-Info.plist
      properties:
        UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIImageName: ""
  WeCookinShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: RecipeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.wecookin.share
        PRODUCT_NAME: WeCookinShareExtension
        SWIFT_VERSION: 5.10
        INFOPLIST_KEY_CFBundleName: "WeCookin'"
        IPHONEOS_DEPLOYMENT_TARGET: 17.0
        CODE_SIGN_ENTITLEMENTS: Config/WeCookinShareExtension.entitlements
        SKIP_INSTALL: true
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: Config/WeCookinShareExtension-Info.plist
      properties:
        CFBundleDisplayName: "Save to WeCookin'"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsAttachmentsWithMaxCount: 10
              NSExtensionActivationSupportsFileWithMaxCount: 10
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 0
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 5
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
schemes:
  WeCookin:
    build:
      targets:
        WeCookin: all
        WeCookinShareExtension: all
